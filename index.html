<style>
:root {
    --margin: min(4vw, 5mm);
}
html {
    font-family: "EB Garamond", serif;
    font-size: 14pt;
    -webkit-text-size-adjust: 100%;
}
body {
    margin: 0;
    overflow-y: hidden;
    background-color: black;
}
html, body {
    overscroll-behavior: none;
}
.background {
    background-image: url(PQxFragonard.webp); /* 20:17 ratio */
    background-attachment: fixed;
    background-repeat: no-repeat;
    background-position-x: center;
    /* trial and error: */
    background-position-y: max(50%, -90svh);
    background-size: max(100vw, calc(17 / 20 * 110svh)) auto;
}
.scroll-wrapper {
    height: 100svh;
    display: flex;
    flex-flow: row nowrap;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    overflow: auto;
}
.title-wrapper {
    box-sizing: border-box;
    width: min(100vw, calc(155mm + (100vw - 155mm) / 2));
    flex: none;
    overflow-x: scroll;
    scrollbar-width: none;
    position: sticky;
    left: 0;
    padding: var(--margin);
    padding-left: calc(var(--margin) + max(0pt, calc((100vw - 155mm) / 2)));
}
.title {
    color: #d8d6c4;
    text-align: center;
    background: #555a;
    padding: var(--margin);
    
    a {
        color: #ebad39;
        font-weight: 500;
    }

    a:hover, a:hover i {
        color: #f0ebc5;
    }

    a:focus, a:focus i {
        color: #f0ebc5;
    }
}
.scroll-wrapper::before { /* Maybe fixes scroll-snap issue where I can't scroll to title page */
    content: "";
    scroll-snap-align: end;
    scroll-snap-stop: always;
    width: 0;
    flex: none;
}
.scroll-wrapper::after {
    content: "";
    width: max(0px, calc((100vw - 155mm) / 2));
    flex: none;
}
.page-wrapper-wrapper {
    display: flex;
    flex-flow: row nowrap;
}
.page-wrapper {
    scroll-snap-align: center;
    scroll-snap-stop: always;
    width: min(155mm, 100vw);
    height: 100%;
    flex: none;
    overflow: scroll;
    scrollbar-width: none;
}
.page {
    margin: var(--margin);
    padding: calc(2 * var(--margin));
    box-shadow: 0 0 var(--margin) #555;
    background-color: rgb(255, 246, 213);
    width: auto;
    height: 220mm;
}
.concealer {
    display: flex;
    flex-flow: row nowrap;
    
    .page-wrapper {
        z-index: 1;
    }
}
.anchor {
    display: block;
    visibility: hidden;
}
</style>
